<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Chess</title>
	<link rel="icon" type="image/x-icon" href="/assets/Black Pawn.svg">
	<style type="text/css">
	</style>
</head>

<body>
	<canvas width="100" height="100" class="myCanvas">
		<p>Your browser doesn't support canvas.</p>
		<style>
			body {
				margin: 0;
				overflow: hidden;
			}
		</style>
	</canvas>
	<script type="text/javascript" src="main.js"></script>
	<script type="text/javascript">
		const black_tile = 'rgb(80,55,20)'
		const white_tile = 'rgb(230,230,230)'
		let images_promise = load_images()
		const canvas = document.querySelector('.myCanvas')
		const width = window.innerWidth
		const height = window.innerHeight
		const square_size = (Math.min(width, height)) / board_dim
		const canvasLeft = canvas.offsetLeft + canvas.clientLeft;
		const canvasTop = canvas.offsetTop + canvas.clientTop;
		function click_to_slection(event) {
			return [Math.floor((event.pageY -canvasTop) / square_size), Math.floor((event.pageX -canvasLeft) / square_size)]
		}
		canvas.width = square_size * board_dim
		canvas.height = square_size * board_dim
		const canvas_context = canvas.getContext('2d');
		const board = new Board();
		let selected = null;
		async function run() {
			const images = await images_promise
			canvas.addEventListener('click', function (event) {
				event.preventDefault()
				if (selected == null) {
					selected = click_to_slection(event)
					if (!board.valid_select(selected)){
						selected = null;
						return
					}
					canvas_context.fillStyle = "rgb(255 0 0 / 20%)"
					canvas_context.fillRect(selected[1] * square_size, selected[0] * square_size, square_size, square_size)
				} else {
					destination = click_to_slection(event)
					board.move_attempt(selected,destination)
					selected = null;
					draw_board(canvas_context, square_size, images, board, black_tile, white_tile)
				}
			});
			draw_board(canvas_context, square_size, images, board, black_tile, white_tile)
		}
		run()
	</script>
</body>

</html>
